# core-api — production compose.
#
# Connects to the SHARED, EXTERNAL PostgreSQL + Redis cluster (one server for all
# microservices). Set DB_HOST / REDIS_HOST in .env to that cluster. This compose does
# NOT start its own Postgres/Redis. For a self-hosted shared cluster, see infra/docker-compose.yml.
#
# Uploaded files are saved to core-api's OWN volume and then forwarded over HTTP to the
# file-processor service (FILE_PROCESSOR_URL) — there is NO shared file volume.

services:
  api:
    build: .
    image: core-api:latest
    container_name: core-api
    env_file: .env
    networks:
      - aixii_net_local
    ports:
      - "${HOST_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - ./api_data:/app/api_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

networks:
  aixii_net_local:
    external: true
